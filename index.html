<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookLikeMe</title>
  <meta name="theme-color" content="#ff7a18">
  <meta name="description" content="CookLikeMe helps you find meals based on ingredients you already have.">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="container">
      <h1>🍳 CookLikeMe</h1>
      <p class="subtitle">Cook with what you have.</p>

      <div class="card">
        <h2>Choose Ingredients</h2>

        <div class="ingredients-box">
          <button class="ingredient-btn" onclick="toggleIngredient('chicken', this)">Chicken</button>
          <button class="ingredient-btn" onclick="toggleIngredient('rice', this)">Rice</button>
          <button class="ingredient-btn" onclick="toggleIngredient('egg', this)">Egg</button>
          <button class="ingredient-btn" onclick="toggleIngredient('bread', this)">Bread</button>
          <button class="ingredient-btn" onclick="toggleIngredient('cheese', this)">Cheese</button>
          <button class="ingredient-btn" onclick="toggleIngredient('butter', this)">Butter</button>
          <button class="ingredient-btn" onclick="toggleIngredient('broccoli', this)">Broccoli</button>
          <button class="ingredient-btn" onclick="toggleIngredient('pasta', this)">Pasta</button>
          <button class="ingredient-btn" onclick="toggleIngredient('tomato', this)">Tomato</button>
          <button class="ingredient-btn" onclick="toggleIngredient('cream', this)">Cream</button>
          <button class="ingredient-btn" onclick="toggleIngredient('tortilla', this)">Tortilla</button>
          <button class="ingredient-btn" onclick="toggleIngredient('lettuce', this)">Lettuce</button>
          <button class="ingredient-btn" onclick="toggleIngredient('beans', this)">Beans</button>
          <button class="ingredient-btn" onclick="toggleIngredient('beef', this)">Beef</button>
          <button class="ingredient-btn" onclick="toggleIngredient('shrimp', this)">Shrimp</button>
          <button class="ingredient-btn" onclick="toggleIngredient('sausage', this)">Sausage</button>
          <button class="ingredient-btn" onclick="toggleIngredient('onion', this)">Onion</button>
          <button class="ingredient-btn" onclick="toggleIngredient('garlic', this)">Garlic</button>
          <button class="ingredient-btn" onclick="toggleIngredient('potato', this)">Potato</button>
          <button class="ingredient-btn" onclick="toggleIngredient('bell pepper', this)">Bell Pepper</button>
          <button class="ingredient-btn" onclick="toggleIngredient('spinach', this)">Spinach</button>
          <button class="ingredient-btn" onclick="toggleIngredient('milk', this)">Milk</button>
          <button class="ingredient-btn" onclick="toggleIngredient('flour', this)">Flour</button>
          <button class="ingredient-btn" onclick="toggleIngredient('parmesan', this)">Parmesan</button>
          <button class="ingredient-btn" onclick="toggleIngredient('mozzarella', this)">Mozzarella</button>
          <button class="ingredient-btn" onclick="toggleIngredient('basil', this)">Basil</button>
          <button class="ingredient-btn" onclick="toggleIngredient('noodles', this)">Noodles</button>
          <button class="ingredient-btn" onclick="toggleIngredient('carrots', this)">Carrots</button>
          <button class="ingredient-btn" onclick="toggleIngredient('corn', this)">Corn</button>
          <button class="ingredient-btn" onclick="toggleIngredient('cabbage', this)">Cabbage</button>
          <button class="ingredient-btn" onclick="toggleIngredient('plantain', this)">Plantain</button>
          <button class="ingredient-btn" onclick="toggleIngredient('thyme', this)">Thyme</button>
          <button class="ingredient-btn" onclick="toggleIngredient('scallion', this)">Scallion</button>
          <button class="ingredient-btn" onclick="toggleIngredient('curry', this)">Curry</button>
          <button class="ingredient-btn" onclick="toggleIngredient('coconut milk', this)">Coconut Milk</button>
          <button class="ingredient-btn" onclick="toggleIngredient('peas', this)">Peas</button>
          <button class="ingredient-btn" onclick="toggleIngredient('bacon', this)">Bacon</button>
          <button class="ingredient-btn" onclick="toggleIngredient('ham', this)">Ham</button>
          <button class="ingredient-btn" onclick="toggleIngredient('turkey', this)">Turkey</button>
          <button class="ingredient-btn" onclick="toggleIngredient('mushrooms', this)">Mushrooms</button>
        </div>

        <div class="custom-input-row">
          <input type="text" id="customIngredient" placeholder="Add your own ingredient">
          <button class="small-btn" onclick="addCustomIngredient()">Add</button>
        </div>

        <h3>Selected Ingredients</h3>
        <div id="selectedIngredients" class="selected-display">None</div>
      </div>

      <div class="card">
        <h2>Pick a Category</h2>
        <div class="category-box">
          <button class="category-btn active-category" onclick="selectCategory('all', this)">All</button>
          <button class="category-btn" onclick="selectCategory('breakfast', this)">Breakfast</button>
          <button class="category-btn" onclick="selectCategory('lunch', this)">Lunch</button>
          <button class="category-btn" onclick="selectCategory('dinner', this)">Dinner</button>
          <button class="category-btn" onclick="selectCategory('quick', this)">Quick</button>
        </div>
      </div>

      <div class="actions">
        <button class="main-btn" onclick="findMeals()">Find Meals</button>
        <button class="main-btn" onclick="surpriseMeal()">Surprise Me</button>
        <button class="secondary-btn" onclick="clearResults()">Clear</button>
      </div>

      <div class="card results-card">
        <h2>Meal Ideas</h2>
        <ul id="results"></ul>
      </div>

      <div class="card">
        <h2>⭐ Favorite Meals</h2>
        <ul id="favoritesList"></ul>
      </div>

      <div class="card">
        <div class="section-header-row">
          <h2>🛒 Grocery List</h2>
          <button class="secondary-btn small-clear-btn" onclick="clearGroceryList()">Clear Grocery List</button>
        </div>
        <ul id="groceryList"></ul>
      </div>
    </div>
  </div>

  <div id="mealModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>

      <h2 id="modalTitle"></h2>
      <p id="modalCategory"></p>
      <p id="modalIngredients"></p>
      <p id="modalInstructions"></p>

      <div class="modal-actions">
        <button onclick="modalSaveFavorite()">❤️ Save</button>
        <button onclick="modalAddToGrocery()">🛒 Add to Grocery</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
          .then(() => console.log("Service Worker registered"))
          .catch(error => console.log("Service Worker registration failed:", error));
      });
    }
  </script>
</body>
</html>
