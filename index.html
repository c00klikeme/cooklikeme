<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookLikeMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="container">
      <h1>🍳 CookLikeMe</h1>
      <p class="subtitle">Pick ingredients, add your own, and find meals by category.</p>

      <div class="card">
        <h2>Choose Ingredients</h2>

        <div class="ingredients-box">
          <button class="ingredient-btn" onclick="toggleIngredient('chicken', this)">Chicken</button>
          <button class="ingredient-btn" onclick="toggleIngredient('rice', this)">Rice</button>
          <button class="ingredient-btn" onclick="toggleIngredient('egg', this)">Egg</button>
          <button class="ingredient-btn" onclick="toggleIngredient('bread', this)">Bread</button>
          <button class="ingredient-btn" onclick="toggleIngredient('cheese', this)">Cheese</button>
          <button class="ingredient-btn" onclick="toggleIngredient('butter', this)">Butter</button>
          <button class="ingredient-btn" onclick="toggleIngredient('broccoli', this)">Broccoli</button>
          <button class="ingredient-btn" onclick="toggleIngredient('pasta', this)">Pasta</button>
          <button class="ingredient-btn" onclick="toggleIngredient('tomato', this)">Tomato</button>
          <button class="ingredient-btn" onclick="toggleIngredient('cream', this)">Cream</button>
          <button class="ingredient-btn" onclick="toggleIngredient('tortilla', this)">Tortilla</button>
          <button class="ingredient-btn" onclick="toggleIngredient('lettuce', this)">Lettuce</button>
          <button class="ingredient-btn" onclick="toggleIngredient('beans', this)">Beans</button>
        </div>

        <div class="custom-input-row">
          <input type="text" id="customIngredient" placeholder="Add your own ingredient">
          <button class="small-btn" onclick="addCustomIngredient()">Add</button>
        </div>

        <h3>Selected Ingredients</h3>
        <p id="selectedIngredients" class="selected-display">None</p>
      </div>

      <div class="card">
        <h2>Pick a Category</h2>
        <div class="category-box">
          <button class="category-btn active-category" onclick="selectCategory('all', this)">All</button>
          <button class="category-btn" onclick="selectCategory('breakfast', this)">Breakfast</button>
          <button class="category-btn" onclick="selectCategory('lunch', this)">Lunch</button>
          <button class="category-btn" onclick="selectCategory('dinner', this)">Dinner</button>
          <button class="category-btn" onclick="selectCategory('quick', this)">Quick</button>
        </div>
      </div>

      <div class="actions">
        <button class="main-btn" onclick="findMeals()">Find Meals</button>
        <button class="secondary-btn" onclick="clearResults()">Clear</button>
      </div>

      <div class="card results-card">
        <h2>Meal Ideas</h2>
        <ul id="results"></ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
